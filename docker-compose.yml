services:
  postgres:
    image: postgres:16
    ports:
      - '5437:5432'
    environment:
      POSTGRES_USER: opkit
      POSTGRES_PASSWORD: opkit_password
      POSTGRES_DB: opkit_db
    volumes:
      - opkit_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U opkit -d opkit_db']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://opkit:opkit_password@postgres:5432/opkit_db?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: opkit_secret
      JWT_EXPIRES_IN: 1d
      FRONTEND_URL: http://localhost:8080
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ''
    ports:
      - '8080:80'
    depends_on:
      - backend

volumes:
  opkit_postgres_data:
